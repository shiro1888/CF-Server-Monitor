name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy prod-watch-core
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
      CLOUDFLARE_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
      CLOUDFLARE_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build:frontend

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.toml

      - name: Sync API secret
        env:
          API_SECRET: ${{ secrets.API_SECRET }}
        run: |
          printf "%s" "$API_SECRET" | npx wrangler secret put API_SECRET --config wrangler.toml
